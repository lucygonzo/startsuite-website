dualPath:
  cards:
    - audience: "Founders"
      heading: "Look like the company you already are, and will be."
      copy: "You are the whole company right now. Every investor, every first hire, every customer meets your brand before they meet you. StartSuite gets your brand ready for those first impressions, and keeps it ready as the company grows into the one you've been building toward."
      cta: "StartSuite for founders"
      href: "/for-founders"
    - audience: "Operators"
      heading: "Show up as one brand, everywhere."
      copy: "Fifteen tools, three agencies, six people's heads. Your team has the work. It doesn't have the organization. StartSuite brings it home so every touchpoint actually earns its keep, and your team has something they'll reach for more than once."
      cta: "StartSuite for operators"
      href: "/for-operators"

proofBar:
  header: "What the people inside our rooms are saying."
  quotes:
    - quote: "I wish I had this on May 5th. We spent months doing internal and external interviews, having people scour the competitive analysis, setting the teams up, getting the brand background work all in one spot."
      highlight: "all in one spot"
      attribution: "CMO, Fortune 200 construction company"
    - quote: "I'm blown away with what we have presented to us. Just how in depth it is, how well thought out it is, how there's such organization to it."
      highlight: "in depth"
      attribution: "Co-founder, healthcare brand"
    - quote: "Once everything is housed here, you don't need to learn new AI tools. You turn an agent loose on your own data and say, give me a LinkedIn post. It knows your voice, your topics, your rules."
      highlight: "It knows your voice, your topics, your rules"
      attribution: "Managing Partner, venture capital fund"
    - quote: "I can't tell you how many years I've been waiting for a team member to willingly share and reference a brand guide."
      highlight: "willingly share and reference a brand guide"
      attribution: "CMO, media platform"

brandHq:
  header: "Where your thinking becomes your team's."
  subhead: "Brand HQ is the living system that holds how you actually think about your brand. Built from deep research, documented so your team will use it, sharper every month you feed it."
  intro: "Brand HQ has five sections. Most start with the first two and build up. Some want everything from day one. Both work. Use what serves you right now, skip what doesn't."
  sections:
    - title: "Brand."
      copy: "Your positioning, voice, and identity. The answer every new hire, partner, and agency already needs, ready before they ask."
    - title: "Market."
      copy: "Your audience, competitors, and the category you're building in. Watched for you."
    - title: "Strategy."
      copy: "What you stand for and where you're headed. Aligned across the team before the next decision."
    - title: "Intelligence."
      copy: "The signals that matter, filtered through your lens. Built so you act on the right ones, not all of them."
    - title: "Operations."
      copy: "Every decision made, every action in flight. So nothing falls through the cracks when a new person joins."
  closing: "Most brands go stale, then rebrand. Yours should just keep getting sharper."
  cta: "See Brand HQ in action"
  href: "/brand-hq"

empowerment:
  header: "Your company. Your call. Our scaffolding."
  subhead: "Your taste, your team, your vision. Always. StartSuite works for you, never the other way around."
  body: "The best companies have a point of view no algorithm can replicate. StartSuite isn't here to replace yours. It gives you the scaffolding to exercise it at the speed and scale your company needs, without handing it over to an agency or drowning in a stack of AI tools you don't have time to learn."
  dont:
    title: "What we don't do"
    items:
      - "Hand your brand to another agency."
      - "Add another AI tool to your stack."
      - "Replace your judgment with a template."
      - "Make you feel small in your own company."
      - "Build something only we can use."
  do:
    title: "What you get instead"
    items:
      - "A system built around your point of view."
      - "Research done with empathy for your customer."
      - "Documentation your team actually reaches for."
      - "Scaffolding you can use at any depth."
      - "Work product that stays yours when we're done."
  services:
    eyebrow: "Three ways to work"
    heading: "Want us to run with it?"
    copy: "Some clients want the system. Others want us to execute on it for them. Most want both at different times."
    modes:
      - title: "The system"
        copy: "Brand HQ as scaffolding your team owns and runs."
      - title: "Done for you"
        copy: "We execute on the system we built, alongside your team."
      - title: "Both"
        copy: "Foundation you own, plus us in the moments that need us. Most land here."
    link: "See how we work"
    href: "/pricing"
  pullQuote:
    quote: "Once everything is housed here, you don't need to learn new AI tools. You turn an agent loose on your own data. It knows your voice, your topics, your rules. It just works."
    attribution: "Managing Partner, venture capital fund"

whoFor:
  header: "For the people who want their brand to keep up with them."
  subhead: "Not just keep up. Get ahead of the market, earn its keep at every touchpoint, and work for the team instead of sitting there."
  cards:
    - title: "Founders"
      heading: "You are the whole company right now."
      body: "Every first impression you make is a brand impression. The deck you remade last weekend. The site you've been meaning to fix. The bio on your LinkedIn. StartSuite gets your brand to the point where your taste actually shows up in the work, instead of getting buried under whatever got shipped fastest."
      cta: "StartSuite for founders"
      href: "/for-founders"
    - title: "Operators & CMOs"
      heading: "A resource your team will actually use."
      body: "Every brand tool you've been handed is either stale, over-engineered, or built for somebody else's workflow. Your team opens it once and forgets about it. StartSuite is built around how your team already works. Documentation that gets better the more you use it. A system that earns its place in the stack."
      cta: "StartSuite for operators"
      href: "/for-operators"
    - title: "Funds & ecosystem partners"
      heading: "The resource your portfolio wishes you had."
      body: "Your founders ask for brand help constantly. You can't cover it yourself. The agencies you refer them to cost too much or miss the room. StartSuite lives inside your portfolio as a founder benefit. Better-branded companies, better-prepped for their next raise, and a creative partner fluent in how funds and founders actually work together."
      cta: "StartSuite for funds"
      href: "/for-funds"

vcFirm:
  header: "A creative firm with a VC firm in-house."
  paragraphs:
    - "Most creative firms raise money from investors and operate alone. StartSuite works the other way. 46 Capital isn't outside looking in. They build alongside us."
    - "For you, that means three things. Strategic work calibrated to how investors actually read a company. A network of operators and investors you can tap when the moment calls for it. A team whose instincts come from having raised, hired, launched, and scaled under pressure, not from having studied it."
    - "We're independent. We're opinionated. We build with conviction and speed."
  cta: "Meet the team"
  href: "/about"

secondProof:
  quote: "As I was reading through, I was like, this is what I want. And I was like, wait, yeah, that's what we've always wanted."
  attribution: "Co-founder, healthcare brand"
  framing: "The moment a client recognizes the brand they've always had in their head, showing up finally on the page, is the moment StartSuite earns its keep."

finalCta:
  header: "We keep our roster small by design."
  body: "StartSuite is built to go deep. That means staying small. We have a handful of spots open right now. Tell us about what you're building and we'll let you know if we're the right fit, or put you on the waitlist if we're not ready for you yet."
  cta_primary: "Request a spot"
  cta_primary_href: "/request-a-spot"
  cta_secondary: "Or book a free intro call"
  cta_secondary_action: "openModal()"
