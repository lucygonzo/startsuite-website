hero:
  eyebrow: 'Creative strategy + design &nbsp;&middot;&nbsp; <span>VC-backed insight</span>'
  headline: 'Taste is your moat.<br><em>Now act like it.</em>'
  subheadline: "StartSuite is the brand operating system for founders and teams who don't have time to wing it. We built what this moment needs."
  cta_primary: "Book an Intro"
  cta_secondary: "See What's Included"
  stats_marginalia: "Verified &middot; Q1 2026"
  stats:
    - num: "$0M+"
      target: 17
      prefix: "$"
      suffix: "M+"
      label: "Capital raised by clients"
    - num: "0+"
      target: 12
      prefix: ""
      suffix: "+"
      label: "Startups supported"
    - num: "0.00"
      target: 4.95
      decimal: true
      prefix: ""
      suffix: ""
      label: "Client satisfaction"

marquee:
  items:
    - "Creative Strategy"
    - "Visual Identity"
    - "Web Design"
    - "Pitch Materials"
    - "Brand Infrastructure"
    - "Ongoing Support"

creativeEdge:
  pill: "The creative edge"
  headline: 'Great storytelling and design aren''t decoration.<span class="sketch-underline"> They''re your unfair advantage.<svg viewBox="0 0 200 12" preserveAspectRatio="none"><path d="M2,8 C30,3 70,10 110,5 S170,9 198,6"/></svg></span>'
  subheadline: "The best startups treat their creative as strategic tools. The data backs it up."
  stats_marginalia: "Third-party research &middot; Not our numbers"
  stats:
    - num: "94%"
      text: "of first impressions are design-driven"
      source: "Stanford Web Credibility Research"
    - num: "3&ndash;4&times;"
      text: "more revenue growth with consistent identity"
      source: "Lucidpress"
    - num: "0.05s"
      text: "to form an opinion of your company online"
      source: "Missouri S&amp;T"
  dim_line_label: "What this means for you"
  cards:
    - num: "01"
      title: "You walk into the room with credibility already established."
      desc: "When your site, deck, and materials tell the same story, investors trust what they see before you say a word."
    - num: "02"
      title: "Every new asset builds on the last instead of starting from zero."
      desc: "A cohesive identity system means your next pitch deck or launch campaign takes hours — not weeks."
    - num: "03"
      title: "Top talent and customers recognize you instantly."
      desc: "Intentional design across every touchpoint signals that you're serious. People remember companies that know who they are."
    - num: "04"
      title: "Your story scales with you — not against you."
      desc: "When identity, messaging, and materials are built as a system, every milestone reinforces what came before."

howItWorks:
  pill: "How it works"
  headline: 'A creative partnership built around<span class="sketch-underline"> your company.<svg viewBox="0 0 200 12" preserveAspectRatio="none"><path d="M3,9 C50,2 90,11 140,4 S185,10 197,6"/></svg></span>'
  description: "Not a ticket queue. Not a one-off project. Personalized, sustainable, and designed to scale with you — from the first conversation to year two and beyond."
  cta_primary: "Book an Intro"
  cta_secondary: "See What's Included"
  steps_marginalia: "4 phases &middot; 1 continuous relationship"
  steps:
    - num: "01"
      title: "We learn your story first."
      desc: "Before we design anything, we get embedded in your world — your positioning, your audience, your goals. Every decision starts from real context."
      tag: "Personalized"
    - num: "02"
      title: "We build your creative foundation in 60 days."
      desc: "Identity, website, pitch materials — all designed as one cohesive system. Everything connects so nothing starts from scratch again."
      tag: "Scalable"
    - num: "03"
      title: "We stay on as your creative team."
      desc: "Monthly design support, strategic office hours, and on-demand assets — from a team that already knows your company inside out."
      tag: "Sustainable"
    - num: "04"
      title: "Your creative compounds every month."
      desc: "The system we build in month one is why assets in month six take half the time. Every deliverable reinforces what came before."
      tag: "Compounds"

