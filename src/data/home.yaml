  headline: 'Taste is your moat.<br><em>Now act like it.</em>'
  subheadline: "StartSuite is the brand operating system for founders and teams who don't have time to wing it. We built what this moment needs."
  cta_primary: "Book an Intro"
  cta_secondary: "See What's Included"
  stats_marginalia: "Verified &middot; Q1 2026"
  stats:
    - num: "$0M+"
      target: 17
      prefix: "$"
      suffix: "M+"
      label: "Capital raised by clients"
    - num: "0+"
      target: 12
      prefix: ""
      suffix: "+"
      label: "Startups supported"
