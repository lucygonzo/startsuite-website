howItWorks:
  pill: "How it works"
  headline: 'A creative partnership built around<span class="sketch-underline"> your company.<svg viewBox="0 0 200 12" preserveAspectRatio="none"><path d="M3,9 C50,2 90,11 140,4 S185,10 197,6"/></svg></span>'
