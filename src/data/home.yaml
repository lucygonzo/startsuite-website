whyStartSuite:
  pill: "Why StartSuite"
  headline: 'The creative team you didn''t know<span class="sketch-underline"> you could have.<svg viewBox="0 0 200 12" preserveAspectRatio="none"><path d="M2,7 C40,3 80,10 120,5 S175,9 198,6"/></svg></span>'
  subheadline: "Agencies are too slow. Freelancers are too fragmented. AI-only tools have no taste. We built a better model."
  layout_marginalia: "Agency vs. Freelancer vs. StartSuite"
  heroCard:
    num: "01"
    title: "Strategy and execution in the same room."
    desc: "We do both — with your full context loaded from day one. No handoffs. No re-briefing. No gaps between what gets planned and what ships."
    team:
      - name: "Creative Strategy + Design"
        role: "Identity &middot; Graphic Design &middot; Art Direction"
        tag: "On your team"
      - name: "Web Design + Development"
        role: "Site architecture &middot; Build &middot; Launch"
        tag: "On your team"
      - name: "Copywriting + Positioning"
        role: "Voice &middot; Messaging &middot; Narrative"
        tag: "On your team"
      - name: "GTM + Sales Enablement"
        role: "Launch assets &middot; Decks &middot; Campaigns"
        tag: "On your team"
  rightCards:
    - num: "02 — Our edge"
      title: "Built with investor perspective in the room."
      desc: "Backed by 46 Capital. We know what the other side of the table looks for — your creative gets built with that lens from day one."
      accent: "46 Capital portfolio insight"
    - num: "03 — Our model"
      title: "Human talent first. Accelerated by AI."
      desc: "AI handles production friction so our team spends time where it counts: 1:1 with you, making the creative decisions only humans can make."
      accent: "Senior-led, every engagement"

