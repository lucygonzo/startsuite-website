tldr:
  header: "StartSuite for founders, in 30 seconds."
  body: "StartSuite is a brand foundation built for founders pre-Series A through Series B. We work with you over a few weeks to build Brand HQ, a living system that holds your strategy, audience, competitive context, and live signals. Your team uses it to onboard faster, brief sharper, run experiments with cleaner signal, and show up to investors with a point of view that lands. Built fast. Owned by you. Sharper every month."

empathy:
  header: "You are the whole company right now."
  body: "Your product is real. Your team is real, even if it's just you and one other person. Your customers are real, even if there are three of them. Every meeting you take is a brand impression. Every deck you remake at midnight is a brand artifact. Every LinkedIn post you draft and don't ship is a missed beat. The brand work is happening either way. The question is whether it's compounding or whether you're rebuilding it every week."

whyNow:
  header: "The cost of being wrong about brand compounds."
  body: "Most founders think brand is a Series B problem. They're wrong, and the cost of being wrong compounds. Without a cohesive point of view, you can't tell what's working. Every test runs against a different version of your message, every customer conversation lands differently, and you can't separate what's pulling from what's noise. A real foundation lets you learn fast. It establishes the wedge that's actually yours, instead of the watered-down version that emerges when you don't have one."
  framings:
    - title: "You learn what's working faster."
      copy: "A cohesive point of view is the test apparatus. Run it against your audience and the signal cuts through. Without it, every result is ambiguous."
      visual: "feed"
    - title: "You build the wedge that's actually yours."
      copy: "Not a fractional CMO's interpretation. Not an agency's framework. The undeniable thing only you can say, sharpened until it sticks."
      visual: "canonical"
    - title: "You move at the speed your stage demands."
      copy: "No ramp time, no relearning, no waiting on someone else to catch up to your business. The foundation is yours from week one."
      visual: "decisionlog"

jobs:
  header: "Five things you've been doing the hard way."
  cards:
    - title: "Pitch with one foundation, not five different decks."
      copy: "Your strategic narrative lives in Brand HQ. Pull from it for the seed deck, the partnerships pitch, the press conversation. Same story, different cuts. No more rebuilding from scratch every Friday."
      visual: "narrative"
    - title: "Hire ahead of your growth curve."
      copy: "Your next senior hire reads Brand HQ before their first day. They show up to week one fluent in your strategy, your customer, and your competition. The ramp time you used to lose is back."
      visual: "onboarding"
    - title: "Brief a contractor in 20 minutes."
      copy: "Send the relevant section. They produce work that matches your taste because the taste is already in the system. No more 'almost there' deliverables that need a rewrite."
      visual: "share"
    - title: "Stop watching your industry from a distance."
      copy: "Brand HQ tracks the signals that move your category and filters them through your strategy. You walk into investor meetings already current."
      visual: "competitive"
    - title: "Launch without losing the thread."
      copy: "Every campaign, every product launch, every announcement starts from the same foundation. The story compounds instead of resetting."
      visual: "campaigns"

caseStudy:
  header: "How a pre-Series A healthcare founder went from seven origin stories to one."
  body: "A pre-Series A healthcare founder came to us with a seven-part origin story he'd been telling investors in different fragments. We organized it into a strategic narrative, built the audience and competitive context around it, and gave his small team a Brand HQ they could pull from. Six weeks later, his pitch was tighter, his first marketing hire ramped in three days instead of three weeks, and his first content brief produced work that didn't have to be redone."
  quote: "I'm blown away with what we have presented to us. Just how in depth it is, how well thought out it is, how there's such organization to it."
  attribution: "Co-founder, healthcare brand"

