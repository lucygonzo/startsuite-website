faq:
  eyebrow: "FAQ"
  header: "What every founder asks before booking the call."
  items:
    - q: "How long does it take to build a Brand HQ?"
      a: "A few weeks, not a few quarters. We start outside-in, mapping what your audience already sees in the world, then organize the internal knowledge living across decks, drives, and team conversations. Most clients have a working Brand HQ within four to six weeks of kickoff."
    - q: "What stage is StartSuite designed for?"
      a: "Founders from pre-Series A through Series B. Earlier than that? We run a Founder Scholarship for protostar-stage founders. Same system, scoped engagement, partial scholarship. The common thread across both paths is taste, ambition, and a real product, not a specific funding round."
    - q: "Do I need to have a brand already, or can you build from scratch?"
      a: "Both work. We've built Brand HQs for founders with a fully-developed brand they wanted organized into a working system, and for founders who came to us with a product, a point of view, and a blank page. The system is the same either way. The work is in the gaps."
    - q: "How is this different from a brand consultant or a fractional CMO?"
      a: "A consultant gives you deliverables. A fractional CMO needs to ramp. StartSuite gives you a living system your team uses every day, built fast and owned by you. The system gets sharper the more your team feeds it. No ramp time, no relearning, no waiting on someone else to catch up to your business."
    - q: "What happens after the first build?"
      a: "You and your team run the system. We're available when you want us in the room: for new launches, repositioning, content sprints, or strategic moments. Some clients have us in monthly. Some come back twice a year. The system works either way."
    - q: "Do you replace my existing tools?"
      a: "No. Brand HQ holds the strategic context that makes your existing tools work better. We bring what you have into Brand HQ on day one, structure it so your team will actually use it, and plug the holes you've been meaning to plug. You keep the tools you like."
    - q: "How do investors and senior hires interact with Brand HQ?"
      a: "You can grant them temporary or scoped access. A senior hire reads Brand HQ before their first day and shows up fluent. An investor sees a polished, public Brand Guide that tells your story in a way that's easy to share. Your contractors and freelancers cite it instead of asking you to re-explain."
    - q: "How does StartSuite handle data, security, and privacy?"
      a: "We treat your data as yours. No training, no third-party sharing, no aggregation across clients. Hosting, encryption, and authentication are detailed on our Trust page. We're happy to fill out your security questionnaire on request."

