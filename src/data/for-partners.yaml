faq:
  eyebrow: "FAQ"
  header: "What every fund partner asks before bringing this to their portfolio."
  items:
    - q: "How does this work alongside our existing founder support?"
      a: "It complements, not competes. Most funds have legal, accounting, recruiting, and PR resources for founders. Brand and creative infrastructure has been the gap nobody filled well. StartSuite is the resource that fills that gap, and it's designed to slot into your existing founder support model without disrupting it."
    - q: "What's the typical engagement structure for funds?"
      a: "Three tiers. Referral (you send founders our way, no commitment from your fund). Subsidized (your fund covers part of the engagement, founders pay the remainder). Embedded partner (StartSuite integrates at the fund level with cohort workshops, office hours, and portfolio brand intelligence). Most fund relationships start at Tier 1 or 2 and evolve."
    - q: "How do you handle confidentiality across portfolio companies?"
      a: "Each Brand HQ is private to its founder. We don't share content, signals, or strategic decisions across portfolio companies. At the fund level (Tier 3), partners can see aggregated portfolio brand health metrics, but never specific competitive context or strategic decisions from individual founders."
    - q: "What's the typical timeline from referral to a working Brand HQ?"
      a: "Four to six weeks from kickoff. Faster for founders who already have substantial existing materials."
    - q: "How do you measure portfolio impact?"
      a: "Three lenses. Founder usage and retention of Brand HQ. Brand-readiness signals at fund LP days, founder pitch events, and exit conversations. And specific outcomes the fund cares about: pitch deck quality, time to next raise, brand consistency across the portfolio, qualitative signals from LPs and downstream investors."
    - q: "How is this different from a brand consultant or fractional CMO program?"
      a: "A consultant gives founders deliverables. A fractional CMO needs to ramp at every new engagement. StartSuite gives founders a living system they own from day one. The system gets sharper the more they use it. No ramp time, no relearning, infrastructure that compounds."
    - q: "Can we white-label this for our fund?"
      a: "We don't white-label the StartSuite or Brand HQ brand. But the founder experience can be co-branded with your fund, and the Champion's Kit can include fund-specific framing. We've found that founders trust StartSuite's independence; they want a creative partner, not a fund's in-house team."
    - q: "How does StartSuite handle data, security, and privacy across multiple portfolio companies?"
      a: "Each Brand HQ is isolated. No data sharing across clients. Hosting, encryption, authentication, and compliance details on our Trust page. We're happy to provide enterprise-level security documentation for fund-level partnerships."

finalCta:
  header: "We work with a small number of funds and partners at a time."
  body: "Tell us about your fund or program and we'll walk you through how StartSuite has worked for partners at your stage. Thirty minutes. No deck. If we're a fit, we'll talk through the right engagement structure. If not, you'll leave with a clearer view of what brand infrastructure could mean for your portfolio."
  cta_primary: "Request a partnership conversation"
  cta_primary_action: "openModal()"
  cta_secondary: "Or send us a note"
  cta_secondary_action: "openModal()"

