tldr:
  header: "StartSuite for partners, in 30 seconds."
  body: "StartSuite is brand and creative infrastructure for VCs, accelerators, and ecosystem partners. We build Brand HQ, a living system, for the founders in your portfolio so they show up branded, prepped, and capable of using their own materials without coming back to you for help. Three engagement models from referral-only to fully embedded. Sharper portfolios. Smarter founder support. A creative partner fluent in how your fund actually works."

empathy:
  header: "You're already the brand consultant for your portfolio. You shouldn't have to be."
  lines:
    - "Your founders ask for brand help constantly."
    - "You can't cover it yourself, and the agencies you refer them to cost too much or miss the room."
    - "The result is portfolios that show up scattered, founders losing credibility because their brand doesn't match their ambition, and you watching it happen from the sideline."

pillars:
  header: "The brand work you wish you could do for them, finally done right."
  subhead: "Every portfolio has the same four gaps. StartSuite is what those four gaps look like when they're filled, at portfolio scale, by people fluent in how your fund actually works."
  cards:
    - icon: "strategy"
      title: "Where their brand strategy actually lives."
      copy: "Each founder gets a Brand HQ holding their positioning, audience, voice, and decisions. Not a logo and a deck. A system that grows with them through every raise, every hire, every category shift."
    - icon: "showup"
      title: "How they show up to your LPs and their investors."
      copy: "Pitch decks that match their ambition. Websites that don't undersell them. A consistent brand presence that signals 'this fund picks well' before the numbers do."
    - icon: "signals"
      title: "How signals from their category reach them."
      copy: "Live competitive intelligence filtered through their strategy. So they walk into every investor meeting and customer conversation already current."
    - icon: "scale"
      title: "How your support scales."
      copy: "Your founders stop coming back to you for brand help. They have the system. They use it. You get to be the strategic partner you signed up to be."
      emphasized: true

beforeAfter:
