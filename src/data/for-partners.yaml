caseStudy:
  header: "What changed for one fund's portfolio in twelve months."
  body: "A managing partner at a venture capital fund came to us with a portfolio of seventeen companies, each with their own brand challenges, each asking for help. He'd been the de facto brand consultant for years, fielding requests, recommending agencies, watching brand decisions get made under pressure. We built a fund-level partnership: a shared resource library, three Brand HQ engagements at portfolio companies in their highest-leverage moments, and quarterly brand reviews across the portfolio. Twelve months later, his portfolio companies were showing up sharper at LP days, the brand questions had stopped landing in his inbox, and two of his companies had named StartSuite as a key part of their go-to-market readiness."
  quote: "Once everything is housed here, you don't need to learn new AI tools. You turn an agent loose on your own data and say, give me a LinkedIn post for Wednesday. It knows your voice, your topics, your rules. It just works."
  attribution: "Managing Partner, venture capital fund"

