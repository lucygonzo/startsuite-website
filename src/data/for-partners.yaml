  body: "StartSuite is independent, opinionated, and built differently than every other creative partner you've evaluated. 46 Capital is in the room with us. For partners, that means three things. We speak fund. We understand cap tables, LP economics, partner dynamics, exit structures. The work we do for your portfolio is calibrated to those realities, not to what an agency thinks 'venture-backed' looks like. And our network is yours."
