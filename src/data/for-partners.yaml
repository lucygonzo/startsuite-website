partnershipModels:
  header: "You don't need to integrate everything to start. You just need to start."
  subhead: "We become the creative partner your ecosystem can trust, at the depth that fits your fund right now. Most relationships start light and build over time."
  tiers:
    - level: "Tier 1"
      label: "Referral"
      title: "Send your founders our way."
      copy: "The simplest model. You refer founders directly to StartSuite. We handle intake, onboarding, delivery. No integration required. You get a trusted creative partner in your back pocket."
      bestFor: "Funds and partners who want a vetted resource without committing to a structured program."
    - level: "Tier 2"
      label: "Subsidized Access"
      title: "Cover part of the engagement for your founders."
      copy: "Your fund or program covers a portion of the Brand HQ engagement. Founders pay the remainder. Positions you as a fund that invests in founder success beyond capital."
      bestFor: "Funds and accelerators with founder-success budgets who want to make brand infrastructure a real benefit."
    - level: "Tier 3"
      label: "Embedded Partner"
      title: "StartSuite as a fund-level resource."
      copy: "We integrate at the fund level. Cohort workshops. Office hours for portfolio founders. Discounted Brand HQ engagements. Quarterly portfolio brand reviews. We become the brand arm of your fund."
      bestFor: "Funds, accelerators, and ecosystem partners ready to make brand infrastructure a core piece of how they support founders."
      emphasized: true

