hero:
  eyebrow: "The Product"
  headline_lead: "Your brand,"
  headline_emphasis: "in one place."
  tagline: "Working harder so you can focus on working smarter."
  subhead: "Custom-built around your strategy, your audience, and the work that moves your business. Yours from day one. Sharper every time your team uses it."
  cta_primary: "Request a walkthrough"
  cta_primary_action: "openModal()"
  cta_secondary: "See it in action"
  cta_secondary_target: "#showcase"

showcase:
  eyebrow: "Real Brand HQs, anonymized"
  shots:
    - kind: "industry"
      label: "Industry Landscape"
      caption: "Industry Landscape, tuned to a 100-year-old construction company at a generational market moment."
    - kind: "listening"
      label: "Listening Feed"
      caption: "Live signals filtered through your strategy. Mentions sorted by sentiment, alerts that matter to your business."
    - kind: "logo"
      label: "Logo System"
      caption: "The work your team needs, the second they need it. Branded, downloadable, always current."

yoursSpecifically:
  eyebrow: "Yours, specifically"
  header: "A Brand HQ tuned to your business, not a template."
  body: "Most brand tools ship the same dashboard to every customer. Brand HQ ships you yours. Your strategy, your signals, your audiences, your work."
  examplesHeader: "How that looks in three real engagements:"
  examples:
    - label: "Construction holding"
      strategy: "A century-old regional builder at a generational market moment."
      surfaces:
        - "State-by-state presence"
        - "IIJA funding alerts"
        - "Centennial countdown"
    - label: "Healthcare founder"
      strategy: "Building clinical credibility behind a founder-led brand."
      surfaces:
        - "Compliance-aware frameworks"
        - "Founder narrative architecture"
        - "Clinical-audience briefs"
    - label: "Consumer platform"
      strategy: "Scaling a founder-led brand into a team-run system."
      surfaces:
        - "Audience persona depth"
        - "Campaign library"
        - "Creative direction layer"
  closing: "Your Brand HQ won't look like anyone else's. That's the point."

whatItIs:
  header: "Strategy, work, and signals. In one system. Tuned to you."
  body: "Three things that usually live in three places: your strategy and taste, the work that comes from it, and the live signals from your audience and market that feed both. We build the first version with you. Your team runs it from there."
  lines:
    - "Built fast, from outside-in research."
    - "Structured around how your team actually works."
    - "Yours to run, with us when it counts."

builtFast:
  header: "Built in weeks, not months."
  subhead: "Most brand discovery takes a quarter and produces a deck. Ours takes weeks and produces a working system."
  body: "Outside-in first: we pull the public picture of your brand together, then organize internal knowledge into a system your team will actually use. Working before most discovery processes finish onboarding."
  framings:
    - title: "Outside-in first."
      copy: "Start with what your audience already sees, not what you think you've said."
    - title: "Internal organization second."
      copy: "What lives in heads, decks, drives, and Slack gets sorted into a system your team can use."
    - title: "Working in weeks."
      copy: "A live Brand HQ ready to walk into, not a 60-page PDF that nobody opens."

roles:
  header: "Built for the people who'll actually use it."
  subhead: "Each role gets what they need, where they expect to find it. The designer doesn't get the executive summary. The developer doesn't get the marketing brief."
  cards:
    - title: "Designers"
      copy: "A design system that updates when the brand updates. Logo files in every format. Color, type, motion, photography rules with the rationale behind every choice."
    - title: "Developers"
      copy: "Tokens, components, and brand rules in machine-readable form. Hook your codebase to the source of truth. The Brand Guide is a public, citeable URL."
    - title: "Marketers"
      copy: "Voice, audience, competitive context, and live signals in one place. The brief generator pulls from your strategy and writes a draft."
    - title: "Executives"
      copy: "Strategic narrative, proof, and live performance. What you need for a board meeting, cold. The dashboard surfaces what changed this week before someone asks."
    - title: "Data and ops"
      copy: "Decisions logged with context. Performance signals filtered through your strategy. The institutional memory your team can't carry alone."

tiers:
  header: "The right idea, at the right moment, to the right person."
  subhead: "Brand HQ doesn't just store everything. It knows when to surface what, and when to keep raw thinking out of the work."
  body: "Half-formed Slack ideas leak into customer pitches. Settled decisions get relitigated by every new hire. Insights from customer calls disappear into transcripts. Brand HQ sorts knowledge by how seriously it's been thought through, and routes what surfaces based on who's asking."
  layers:
    - level: "Canonical"
      copy: "The decisions you've actually made. Cited, defended, used in the work."
    - level: "Decided"
      copy: "Working positions your team operates from. Trusted, but still moving."
    - level: "Observed"
      copy: "Raw signal from meetings, conversations, and the world. Reference until your team decides it's more."
  closing: "Your agents and your team work from canonical and decided. Observed surfaces when relevant, never when it shouldn't. Every decision that crosses a layer gets logged."

northStar:
  header: "Your strategy at the center. Five sections that carry it into the work."
  body: "Brands compound on consistency under pressure. Brand HQ is built around your north star and structured so it shows up in the work, the signals, and the decisions your team makes."
  sections:
    - title: "Brand"
      lede: "Your point of view, made tangible."
      copy: "Positioning, voice, visual identity, and the operating standards that keep it consistent across teams and partners."
    - title: "Market"
      lede: "The world your point of view is operating in."
      copy: "Your audience, your competitors, the category you're building. Watched on a cadence so it stays current with reality."
    - title: "Strategy"
      lede: "Your point of view, made actionable."
      copy: "What you stand for, where you're headed, the moments that matter in your customer journey."
    - title: "Intelligence"
      lede: "Your point of view, applied to live signals."
      copy: "The world feeds Brand HQ a constant stream. We filter, synthesize, and surface what matters through your strategic lens."
    - title: "Operations"
      lede: "Your point of view, in the record."
      copy: "Decisions made and why. Actions in flight. Onboarding for new team members. The institutional memory that keeps the system honest."

jobs:
  header: "The work this actually replaces."
  subhead: "The jobs Brand HQ does for the people who run it."
  cards:
    - title: "Onboard a new team member without booking five meetings."
      copy: "Brand HQ is the onboarding. They read the canonical layer, follow the citations, show up fluent."
    - title: "Brief an agency in 20 minutes instead of three weeks."
      copy: "Send the relevant section. They get strategic context, operating standards, and live signals. The work doesn't have to be redone."
    - title: "Make decisions without relitigating them every quarter."
      copy: "Decisions log with context. Your team can see why, when, and what's changed since. New hires don't reopen settled questions."
    - title: "Stay current without staring at a dashboard."
      copy: "Brand HQ watches the signals you care about, filters them through your strategy, and surfaces what matters."
    - title: "Brief leadership without three rounds of edits."
      copy: "Strategic narrative, recent activity, and proof points already in place. Pull, present, move on."
    - title: "Hand off without losing the thread."
      copy: "When someone leaves, their work, decisions, and rationale stay. The next person starts where they left off."

publicOutputs:
  header: "Brand HQ doesn't just live behind a login."
  body: "The same system that runs internally produces the work your team needs to share. A public Brand Guide your contractors and partners can cite. A press kit that updates when the brand updates. An asset library your team can pull from without a Slack request."
  caption: "The Brand Guide above lives at a public URL. Your team and partners cite it instead of reconstructing it."
  outputs:
    - label: "Brand Guide"
      detail: "Public, citeable URL"
    - label: "Press Kit"
      detail: "Updates when the brand updates"
    - label: "Asset Library"
      detail: "Pull-from-anywhere downloads"

stack:
  header: "Already have tools that work?"
  body: "Most of our clients did. Brand HQ doesn't replace your stack. It's the place where the strategic context that makes the stack work lives."
  bringIns:
    - label: "PDFs nobody opens"
      detail: "Restructured into a system your team will use."
    - label: "Notion workspaces that drifted"
      detail: "Reorganized around how your team actually works."
    - label: "Frontify, Figma, CRM notes"
      detail: "Connected to the canonical record."
    - label: "Tribal knowledge"
      detail: "Pulled out of heads and into the work."
  closing: "We bring what you have into Brand HQ on day one. You decide what stays in your existing tools and what comes home."

whosUsing:
  header: "Running right now."
  body: "Inside Fortune 200 companies, venture-backed founders, and the funds that back them. Different stages, different industries, same system. Tuned per business."

quote:
  text: "Once everything is housed here, you don't need to learn new AI tools. You turn an agent loose on your own data and say, give me a LinkedIn post. It knows your voice, your topics, your rules."
  attribution: "Managing Partner, venture capital fund"

finalCta:
  header: "See if Brand HQ is right for your company."
  body: "Tell us what you're building. We'll walk you through a live Brand HQ for a company like yours. Thirty minutes. No deck."
  cta_primary: "Request a walkthrough"
  cta_primary_action: "openModal()"
  cta_secondary: "Or send a note"
  cta_secondary_action: "openModal()"
