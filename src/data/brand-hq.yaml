  closing: "Your Brand HQ won't look like anyone else's. That's the point."

flow:
  eyebrow: "How it works"
  header: "Inputs feed your north star. Your north star powers the work."
  body: "Research, assets, knowledge, and signals feed in. Five sections tune to your business. Outputs go everywhere your team needs them."

inputs:
  eyebrow: "Inputs"
  header: "What feeds into it."
  body: "We don't make you start from zero. Brand HQ pulls from research we run, the assets you already have, the knowledge in your team's heads, and the live signals your category produces every day."
  groups:
    - title: "Outside-in research"
      items:
        - "Audience interviews"
        - "Competitive analysis"
        - "Category mapping"
        - "Public-facing brand audit"
    - title: "Existing assets"
      items:
        - "Notion, PDFs, Figma"
        - "Frontify, brand guidelines"
        - "CRM and audience notes"
        - "Anything in Drive"
    - title: "Internal knowledge"
      items:
        - "Stakeholder interviews"
        - "Slack archives"
        - "Decision history"
        - "Tribal knowledge in heads"
    - title: "Live signals"
      items:
        - "Mention monitoring"
        - "Sentiment tagging"
        - "Alert routing"
        - "Category news"

tiers:
  header: "The right idea, at the right moment, to the right person."
  subhead: "Brand HQ doesn't just store everything. It knows when to surface what, and when to keep raw thinking out of the work."
  body: "Half-formed Slack ideas leak into customer pitches. Settled decisions get relitigated by every new hire. Insights from customer calls disappear into transcripts. Brand HQ sorts knowledge by how seriously it's been thought through, and routes what surfaces based on who's asking."
  layers:
    - level: "Canonical"
      copy: "The decisions you've actually made. Cited, defended, used in the work."
    - level: "Decided"
      copy: "Working positions your team operates from. Trusted, but still moving."
    - level: "Observed"
      copy: "Raw signal from meetings, conversations, and the world. Reference until your team decides it's more."
  closing: "Your agents and your team work from canonical and decided. Observed surfaces when relevant, never when it shouldn't. Every decision that crosses a layer gets logged."

northStar:
  eyebrow: "The North Star"
  header: "Your strategy at the center. Five sections that carry it into the work."
  body: "Brands compound on consistency under pressure. Brand HQ is structured around your north star so it shows up in the work, the signals, and the decisions your team makes."
  sections:
    - title: "Brand"
      lede: "Your point of view, made tangible."
      copy: "Positioning, voice, and identity that stay consistent across teams and partners."
      features:
        - "Positioning + value props"
        - "Voice principles + examples"
        - "Logo system + downloads"
        - "Color, type, motion, photo standards"
        - "Operating do's and don'ts"
    - title: "Market"
      lede: "The world your point of view is operating in."
      copy: "Your audience, competitors, and category, watched so they stay current with reality."
      features:
        - "Audience persona depth"
        - "Competitive intelligence"
        - "Category mapping"
        - "Cadence-driven monitoring"
        - "Macro forces and trends"
    - title: "Strategy"
      lede: "Your point of view, made actionable."
      copy: "What you stand for, where you're headed, and the moments that matter."
      features:
        - "North star + strategic pillars"
        - "Customer journey mapping"
        - "Strategic narrative"
        - "Growth thesis"
        - "Decision history + rationale"
    - title: "Intelligence"
      lede: "Your point of view, applied to live signals."
      copy: "Constant stream from the world, filtered through your strategic lens."
      features:
        - "Listening feed (filtered)"
        - "Sentiment tagging"
        - "Alert routing"
        - "Synthesis briefs"
        - "Performance dashboard"
    - title: "Operations"
      lede: "Your point of view, in the record."
      copy: "Decisions, actions, and onboarding. The institutional memory that keeps the system honest."
      features:
        - "Decision log with citations"
        - "Action tracker"
        - "Onboarding portal"
        - "Knowledge handoff"
        - "Audit trail"
      tiers:
        - level: "Canonical"
          copy: "Decisions you've made. Cited, used in the work."
        - level: "Decided"
          copy: "Working positions. Trusted, still moving."
        - level: "Observed"
          copy: "Raw signal. Reference until your team decides it's more."
      tiersCaption: "Knowledge sorts into three layers. Agents and your team work from canonical and decided. Observed surfaces when relevant."

