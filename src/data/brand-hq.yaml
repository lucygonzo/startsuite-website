faq:
  eyebrow: "Common questions"
  header: "What people ask before the walkthrough."
  items:
    - q: "How is Brand HQ different from a brand guide PDF, Notion, or Frontify?"
      a: "Those are document stores. Brand HQ is a living system. It holds your strategy, watches your category, and produces the work in your voice. Documents go stale and get ignored. Brand HQ gets sharper every time your team uses it."
    - q: "How long does it take to set up?"
      a: "Weeks, not months. We start outside-in, pull in your existing assets in week one, and have a working Brand HQ ready for your team to walk into before most discovery processes finish onboarding."
    - q: "Who owns Brand HQ once it's built?"
      a: "You do. Your data, your strategy, your work product. Yours from day one. Yours when we're done. We're available when you want us. We're not a permanent dependency."
    - q: "How does AI fit in? Is this just a wrapper over ChatGPT?"
      a: "Brand HQ structures your knowledge so the AI tools you already use work with your data. You turn an agent loose on canonical and decided knowledge, not raw transcripts. You don't learn new tools. Your tools learn you."
    - q: "What happens if my brand changes?"
      a: "Brand HQ updates with you. Decisions log with context. The Brand Guide updates when the brand updates. Onboarding stays current. New hires don't relitigate settled questions."
    - q: "Who on my team will use it?"
      a: "Designers, developers, marketers, executives, and operations leads. Each role gets the same source of truth surfaced for their workflow. Designers see the design system and downloadable files. Developers get tokens and machine-readable rules. Marketers get briefs, voice, and live signals. Executives get strategic narrative and performance. Ops gets decision logs and audit trails."
    - q: "What does Brand HQ actually replace in my day?"
      a: "Onboarding meetings (new hires read the canonical layer and show up fluent). Three-week agency briefs (send the relevant section). Decisions relitigated every quarter (logged with rationale). Dashboard staring (signals filtered through your strategy). Edit-heavy leadership briefs (strategic narrative ready to pull). Handoff churn (work and decisions stay in the system)."
    - q: "How big does my company need to be?"
      a: "We work with Fortune 200 enterprises, venture-backed founders, and the funds that back them. Different stages, same system, tuned per business. If you have a strategy and a team, Brand HQ has leverage to add."
    - q: "What does it cost?"
      a: "It depends on engagement scope and how much execution support you want. We're built to go deep, which means staying small. Pricing details and engagement models live on our pricing page, or we'll walk you through them in the demo."
    - q: "What's the walkthrough?"
      a: "Thirty minutes. No deck. We show you a live Brand HQ for a company like yours so you can see exactly what you'd get. No commitment."

quote:
  text: "Once everything is housed here, you don't need to learn new AI tools. You turn an agent loose on your own data and say, give me a LinkedIn post. It knows your voice, your topics, your rules."
