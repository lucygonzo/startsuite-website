yoursSpecifically:
  eyebrow: "Yours, specifically"
  header: "A Brand HQ tuned to your business, not a template."
  body: "Most brand tools ship the same dashboard to every customer. Brand HQ ships you yours. Your strategy, your signals, your audiences, your work."
  examplesHeader: "How that looks in three real engagements:"
  examples:
    - label: "Construction holding"
