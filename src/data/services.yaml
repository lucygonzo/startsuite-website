        label: "Sessions / month"
      - val: "1:1"
        label: "With senior team"
      - val: "GTM"
        label: "Strategy included"
      - val: "VC"
        label: "Positioning lens"

timeline:
  pill: "Why 12 months"
  headline: "The 12-month commitment is a feature, not a clause."
  description: "Brand systems compound. The first 60 days build the infrastructure. Months three through six are when it pays off. By month twelve your creative foundation is doing real work in investor meetings, hiring conversations, and pitches you haven't had yet. A 30-day sprint can't build that."
  dimLineLabel: "The compounding timeline"
  milestones:
    - dot: "M1"
      month: "Month 1"
      title: "Foundation is live"
      desc: "Brand system, logo suite, Brand HQ, and messaging alignment delivered. Your team has a creative home base for the first time."
    - dot: "M2"
      month: "Month 2"
      title: "Website and decks ship"
      desc: "Positioning-led site is live. Pitch deck template and one-pager delivered. Walk into your next meeting looking like the company you're building toward."
    - dot: "M3+"
      month: "Month 3 onward"
      title: "Creative rhythm takes over"
      desc: "1 to 2 design pieces per month, strategic office hours, ongoing alignment. The system keeps running while you keep building."
    - dot: "M12"
      month: "Month 12"
      title: "Brand is a real asset"
      desc: "Consistent, scalable, working for you. Not a liability to manage around. A competitive advantage built with intention over a year."

finalCta:
  pill: "Limited availability"
  headline: "We cap our client list <em>intentionally.</em>"
  description: "Real partnership requires real attention. We take on a limited number of Foundations clients at a time so we can be genuinely present for each one. If you're ready to treat your brand as seriously as your product, let's see if there's a fit."
  cta: "Book Intro Call"
  notes:
    - "No commitment on the call"
    - "30 minutes"
    - "We come prepared"
  dimLineLabel: "StartSuite · 2026"
