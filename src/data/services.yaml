    - who: "Freelancer loop"
      cost: "$3k&ndash;$8k"
      desc: "Briefing from zero every time, no continuity, no strategy"
      highlight: false
    - who: "In-house junior hire"
      cost: "$5k&ndash;$9k"
      desc: "One skill set, no strategic layer, still needs managing"
      highlight: false
    - who: "StartSuite Foundations"
      cost: "$2,000/mo"
      desc: "Senior team, embedded context, infrastructure that compounds"
      highlight: true
