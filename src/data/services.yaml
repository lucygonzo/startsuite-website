meta:
  title: "How StartSuite Works | Engagement models for Brand HQ"
  description: "Four ways to work with StartSuite: the system you run, done-for-you execution, both at different times, or embedded. Built around how serious companies actually operate."
  ogTitle: "How We Work"
  ogDescription: "Four engagement models. One product. Built around how serious founders, operators, and partners actually work."

referenceBrand: "Atlas Co"

hero:
  eyebrow: "How we work"
  headline_lead: "One product. Four ways to work."
  headline_emphasis: "The right shape for the moment you're in."
  subhead: "StartSuite is built around Brand HQ, your living brand operating system. How we work alongside you depends on what your team needs from us right now. Most clients move between modes as the work demands."
  cta_primary: "Request to join"
  cta_primary_action: "openModal()"
  cta_secondary: "See Brand HQ"
  cta_secondary_href: "/brand-hq"
  visual_caption: "One product, four engagement shapes. Brand HQ at the center."

why:
  header: "Brand work breaks when the engagement model is wrong."
  body: "A traditional agency contracts for deliverables. A SaaS tool contracts for seats. A consultant contracts for hours. None of those shapes fit the work brand actually requires, which is a foundation that compounds over months and years, with execution support that scales up and down based on what's happening in the business, and partnership that goes deeper than the build itself when the moment calls for it."
  lines:
    - "We built four engagement shapes so the work can match the moment."
    - "You can move between them as the business changes."
    - "The product is the same. The depth and the partnership shape is what changes."

modes:
  header: "Pick the mode. Or let us recommend one."
  subhead: "Most engagements start in one mode and evolve. The shape isn't locked, the work is."
  cards:
    - id: "system"
      number: "01"
      name: "The System"
      claim: "Brand HQ as scaffolding your team owns and runs."
      forTag: "Teams with strong internal brand muscle"
      whatsInIt:
        - "Full Brand HQ build, customized to your business"
        - "Your team trained to run it"
        - "Documented and handed off, owned by you"
      cta: "Talk to us about the System"
    - id: "doneforyou"
      number: "02"
      name: "Done For You"
      claim: "We execute on the system, alongside your team."
      forTag: "Teams that need senior creative help in the room"
      whatsInIt:
        - "Brand HQ built, run, and maintained by us"
        - "Active execution: campaigns, content, assets, briefs"
        - "Senior-led, embedded in your business context"
      cta: "Talk to us about Done For You"
    - id: "both"
      number: "03"
      name: "Both"
      claim: "The foundation you own, plus us in the moments that need us."
      forTag: "Most operators, founders, and fund-backed companies"
      whatsInIt:
        - "Full Brand HQ build, owned by you"
        - "Your team runs it day-to-day"
        - "Us on retainer or per-engagement when moments demand"
      cta: "Talk to us about Both"
      emphasized: true
      emphasisLabel: "Most clients land here"
    - id: "embedded"
      number: "04"
      name: "Embedded"
      claim: "A partnership deeper than a build. We sit inside your team, program, or stack."
      forTag: "Funds, accelerators, and AI-implementation work"
      whatsInIt:
        - "AI and workflow implementation, scoped to your business"
        - "Brand HQ as the recommended foundation"
        - "Embedded across cohorts, portfolios, or programs"
      cta: "Talk to us about Embedded"
      isPartnership: true

phases:
  header: "Three phases. Same shape across every mode."
  subhead: "Loose timeline, tight structure. Working sessions, not status meetings."
  cards:
    - num: "01"
      name: "Discover"
      what: "We learn how your business actually works, from the outside in."
    - num: "02"
      name: "Build"
      what: "Brand HQ comes to life, populated with your real strategy and context."
    - num: "03"
      name: "Run"
      what: "Your team runs the system. Our involvement matches the mode."

team:
  header: "Senior-led from day one. No account managers between you and the work."
  body: "Every engagement is led by senior creative judgment. Lucy and Reagan are involved directly in every Brand HQ build. We bring in specialist support, designers, strategists, writers, motion experts, when the work calls for it. There's no tier of junior creatives executing on your account. The people who know your business are the same people making decisions about it."

handoff:
  header: "Everything we build is yours to keep, run, and grow."
  body: "Brand HQ is your asset, not ours. At the end of every engagement, you have a fully owned, fully documented brand operating system. Your team can run it. Your future agencies can pull from it. Your AI tools can query it. We're available for ongoing work, but the system itself doesn't depend on us being in the room."
  handoffCol:
    title: "What we hand off (every mode)"
    items:
      - "A live Brand HQ, fully populated, fully owned by you"
      - "The strategic narrative, audience research, and competitive intelligence"
      - "Operating standards your team and partners can cite"
      - "Documentation, access patterns, and onboarding for new hires"
  keepCol:
    title: "What we can keep running (Done For You, Both, Embedded)"
    items:
      - "Active creative execution"
      - "Live signal monitoring and strategic alerts"
      - "Quarterly reviews and brand health assessments"
      - "Senior creative direction in the moments that matter"

examples:
  header: "Four engagements. Four shapes. Same product underneath."
  cards:
    - tag: "The System"
      pull: "Six weeks to build. Handed off clean."
      body: "A Fortune 200 CMO came to us for the missing infrastructure layer. Her team runs it now; we return twice a year for strategic reviews."
    - tag: "Done For You"
      pull: "Sharper at every investor meeting."
      body: "A pre-Series A founder needed senior creative help while he focused on product. We run his pitch decks, content, and launches through the system."
    - tag: "Both"
      pull: "One brand. Three pivots. Still consistent."
      body: "A venture-backed healthcare brand wanted to own the foundation but knew they'd need help in the rooms that mattered. Quarterly cadence plus event-driven work has carried them through a launch, a leadership transition, and a category shift."
    - tag: "Embedded"
      pull: "A platform, not a referral."
      body: "A VC fund brought us in across their portfolio: Brand HQs at three high-leverage companies, cohort workshops for the rest, plus quarterly reviews and AI guidance for individual founders. They scaled founder support without scaling their team."

faq:
  eyebrow: "FAQ"
  header: "Engagement questions, answered."
  items:
    - q: "How do we know which mode is right for us?"
      a: "We figure that out together. Most first conversations include a working sense of which mode fits. Many engagements start in one mode and evolve as the business needs change. The shape isn't locked, the work is."
    - q: "Can we move between modes?"
      a: "Yes. Most engagements do. Some clients start at The System and add Done For You for a major launch. Some start at Done For You and graduate into Both as their team grows. Some start at Embedded and move into a full build when the moment calls for it."
    - q: "How long does a typical engagement last?"
      a: "The build phase is usually four to six weeks. The run phase varies by mode. The System engagements often pause after handoff, with us returning for tune-ups. Done For You and Both engagements run on retainer or per-project terms, often spanning a year or more. Embedded engagements are scoped to the partnership shape."
    - q: "What's the team structure on our engagement?"
      a: "Senior-led from day one. Lucy and Reagan are directly involved in every Brand HQ build. We bring in specialist creative support, designers, writers, strategists, motion experts, when the work calls for it. Your engagement does not have layers of junior creatives executing while seniors collect the brief and disappear."
    - q: "Do we own what you build?"
      a: "Yes. Brand HQ is your asset. The strategic narrative, the audience research, the operating standards, the documentation. All of it is yours, hosted on infrastructure you can access and export. We're available for ongoing work, but nothing depends on us being in the room."
    - q: "How does pricing work across the four modes?"
      a: "Pricing is engagement-specific because the modes have meaningfully different scopes. We're transparent about pricing in our intro conversation. Pricing details are also on our Pricing page."
    - q: "What if we want help we haven't named yet?"
      a: "That's often where Embedded fits. Some teams come to us knowing they need help implementing AI in their workflows but don't yet know what should be built. Some funds want a partner inside their program but aren't sure what that looks like. The conversation reveals the shape. Sometimes Embedded is the right starting place. Sometimes the conversation reveals one of the other three modes is a better fit."
    - q: "How does StartSuite handle data, security, and privacy?"
      a: "We treat your data as yours. No training, no third-party sharing, no aggregation across clients. Hosting, encryption, authentication, and compliance details on our Trust page."

finalCta:
  header: "Tell us what you're working on. We'll help find the right shape."
  body: "Most first conversations end with a clear sense of which mode fits and what an engagement would look like. Thirty minutes. No deck. If we're a fit, we'll talk through the right structure. If we're not, you'll leave with a clearer view of how to think about the work either way."
  cta_primary: "Request to join"
  cta_primary_action: "openModal()"
  cta_secondary: "Book a call"
  cta_secondary_action: "openModal()"

