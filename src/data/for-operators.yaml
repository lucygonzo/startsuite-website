caseStudy:
  header: "How a Fortune 200 CMO finally connected the brand to the business."
  body: "A CMO at a Fortune 200 construction company came to us with a brand that lived everywhere and nowhere. Decades of work, four sub-brands, three agencies, a dozen state-by-state cuts, and a centennial milestone she was running toward without a system to organize against. Six weeks later, her team had a Brand HQ that consolidated the strategy, the state-by-state intelligence, the centennial roadmap, and the live category signals. The first board meeting after, she walked in with the brand connected to the business in a way she'd been trying to articulate for two years."
  quote: "I wish I had this on May 5th, honestly. We spent months doing internal and external interviews, having people scour the competitive analysis, setting the teams up, getting the brand background work all in one spot."
  attribution: "CMO, Fortune 200 construction company"

