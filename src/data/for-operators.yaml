faq:
  eyebrow: "FAQ"
  header: "What every CMO asks before booking the call."
  items:
    - q: "How is this different from Notion, Frontify, or a brand consultant?"
      a: "Notion is a workspace. Frontify is a brand asset manager. A consultant gives you deliverables. None of them hold the strategic context that makes the brand actually work across teams, agencies, and time. Brand HQ does. Longer comparison lives on our comparison page. Or grab the executive overview from the Champion's Kit for a one-page version."
    - q: "How does Brand HQ work alongside our existing tools?"
      a: "Brand HQ holds the strategic context that makes your existing tools work harder. Notion, Figma, Frontify, Asana, your CRM, your CMS. We integrate with what you have, bring the scattered context into a single source of truth, and let the rest of your stack pull from it."
    - q: "How long does implementation take?"
      a: "Most operator engagements have a working Brand HQ within four to six weeks of kickoff. The team can start using Brand HQ before the engagement is finished."
    - q: "Can multiple agencies and contractors share access?"
      a: "Yes. Brand HQ has scoped, time-bounded access for agencies, contractors, freelancers, and partners. Read-only by default, time-limited, and you see who accessed what."
    - q: "How does this fit with our existing brand governance?"
      a: "It enforces governance. Brand HQ holds canonical, decided, and observed layers. Your governance process decides what becomes canonical. The system makes sure everyone operates from the canonical layer."
    - q: "How do we measure brand impact?"
      a: "Brand HQ ties every brand pillar to measurable signals. Sentiment, category share, audience growth, campaign-to-revenue. Configure dashboards to match how your business measures things."
    - q: "What about brand change management?"
      a: "Strategic shifts dated. Decisions logged with rationale. Active workstreams have owners. New positions enter the decided layer for adoption before becoming canonical."
    - q: "How does StartSuite handle data, security, and privacy?"
      a: "We treat your data as yours. No training, no third-party sharing, no aggregation across clients. Details live on our Trust page. We're happy to fill out your security questionnaire on request."
    - q: "What happens after the initial build?"
      a: "You and your team run the system. We're available for new launches, repositioning, content sprints, brand refreshes, or strategic moments. Some clients work with us monthly. Some come back twice a year."

finalCta:
