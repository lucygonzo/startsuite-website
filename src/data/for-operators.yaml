whyNow:
  header: "You're paying for context twice."
  body: "Operators rarely think they're doing brand work wrong. They're doing it the way it's been done for fifteen years. The problem isn't effort. It's that the model was built for fewer channels, fewer tools, and fewer people who needed to understand the brand. The cost shows up in three places."
  columns:
    - title: "You stop paying for context twice."
      copy: "Every new agency, contractor, and hire stops re-onboarding to your brand from scratch."
      visual: "library"
    - title: "You can show the work in CFO language."
      copy: "Brand pillars tied to performance signals. Campaigns tied to revenue. The brand pitch becomes a business pitch."
      visual: "performance"
    - title: "The brand survives the team change."
      copy: "Decisions logged. Strategic shifts dated. The next person walks in and starts ahead, not from scratch."
      visual: "onboarding"

