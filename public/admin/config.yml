  # ────────────────────────────────────────────
  #  Settings  (file collections)
  # ────────────────────────────────────────────
  - name: "settings"
    label: "Settings"
    files:

      # ── Navigation ──────────────────────────
      - name: "nav"
        label: "Navigation"
        file: "src/data/nav.yaml"
        fields:
          - label: "Logo"
            name: "logo"
            widget: "object"
            fields:
              - { label: "Mark", name: "mark", widget: "string" }
              - { label: "Text", name: "text", widget: "string" }
              - { label: "Powered By", name: "powered_by", widget: "string" }
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Href", name: "href", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "ID", name: "id", widget: "string" }
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Action", name: "action", widget: "string" }

      # ── Footer ──────────────────────────────
      - name: "footer"
        label: "Footer"
        file: "src/data/footer.yaml"
        fields:
          - label: "Brand"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Description", name: "description", widget: "text" }
          - label: "Columns"
            name: "columns"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Href", name: "href", widget: "string", required: false }
                  - { label: "Action", name: "action", widget: "string", required: false }
          - label: "Bottom"
            name: "bottom"
            widget: "object"
            fields:
              - { label: "Copyright", name: "copyright", widget: "string" }
              - { label: "Powered By", name: "powered_by", widget: "string" }

  # ────────────────────────────────────────────
  #  Case Studies  (folder collection)
  # ────────────────────────────────────────────
  - name: "case-studies"
    label: "Case Studies"
    folder: "src/content/case-studies"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Industry", name: "industry", widget: "string" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - label: "Stats"
        name: "stats"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
      - label: "Testimonial"
        name: "testimonial"
        widget: "object"
        required: false
        fields:
          - { label: "Quote", name: "quote", widget: "text" }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
      - { label: "Published", name: "published", widget: "boolean", default: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  # ────────────────────────────────────────────
  #  Resources  (folder collection)
  # ────────────────────────────────────────────
  - name: "resources"
    label: "Resources"
    folder: "src/content/resources"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Guide", value: "guide" }
          - { label: "Template", value: "template" }
          - { label: "Insight", value: "insight" }
          - { label: "Toolkit", value: "toolkit" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Published", name: "published", widget: "boolean", default: false }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
